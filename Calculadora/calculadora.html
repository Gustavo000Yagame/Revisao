<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <script src="calculadora.js" defer></script>
    <link rel="stylesheet" href="calculadora.css">
</head>
<body>
    <div id="margem-calculadora">
    <form id="calculadora">
        <input type="number" id="num1" placeholder="Digite o numero 1">
        <br>
        <input type="number" id="num2" placeholder="Digite o numero 2">
        <br>
        <select id="operacao">
            <option value="somar">somar</option>
            <option value="diminuir">diminuir</option>
            <option value="multiplicar">Multiplicar</option>
            <option value="dividir">Dividir</option>
        </select>
        <button type="submit">Calcular</button>
    </form>
    <div id="resultado"></div>
    <input type="button" id="limpiar" value="Limpar">
</div>
</body>
</html>
